            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .breadcrumb a {
            color: var(--link-color);
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }

        .clue-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px var(--card-shadow);
            margin-bottom: 24px;
        }

        .clue-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
        }
        .clue-number {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: #2563eb;
            border-radius: 6px;
            padding: 2px 10px;
            text-transform: capitalize;
        }
        .clue-enum {
            font-size: 14px;
            color: var(--text-muted);
        }
        .clue-text {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .clue-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .clue-meta a { color: var(--link-color); text-decoration: none; }
        .clue-meta a:hover { text-decoration: underline; }

        .hints-section h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
        }

        .hint-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: var(--hint-bg);
            border: 1px solid var(--hint-border);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: var(--link-color);
            transition: all 0.2s;
        }
        .hint-btn:hover {
            border-color: var(--link-color);
        }
        .hint-text {
            display: none;
            padding: 12px 16px;
            margin-top: -8px;
            margin-bottom: 8px;
            background: var(--hint-bg);
            border: 1px solid var(--hint-border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .hint-text.visible { display: block; }
        .hint-btn.revealed {
            border-radius: 8px 8px 0 0;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        .full-puzzle-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .full-puzzle-link:hover { background: #1d4ed8; }

        .loading-state, .error-state {
            text-align: center;
            padding: 60px 20px;

        }
        .error-state a { color: var(--link-color); }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-faint);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .clue-text { font-size: 18px; }
        }

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon();
        }
        function updateThemeIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.querySelectorAll('.theme-icon').forEach(function(el) {
                el.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
            });
        }
        updateThemeIcon();

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const puzzleNumber = '__PUZZLE_NUMBER__';
        const clueRef = '__CLUE_REF__';
        const hintLabels = ['Hint 1: Gentle nudge', 'Hint 2: More specific', 'Hint 3: Strong hint', 'Hint 4: Full explanation'];

        function toggleHint(index) {
            const text = document.getElementById('hint-' + index);
            const btn = document.getElementById('hint-btn-' + index);
            if (text.classList.contains('visible')) {
                text.classList.remove('visible');
                btn.classList.remove('revealed');
            } else {
                text.classList.add('visible');
                btn.classList.add('revealed');
            }
        }

        async function loadClue() {
            const el = document.getElementById('clueContent');
            try {
                const resp = await fetch('/api/clue/' + encodeURIComponent(puzzleNumber) + '/' + encodeURIComponent(clueRef));
                if (!resp.ok) {
                    el.innerHTML = '<div class="error-state">Clue not found. <a href="/puzzle/' + escapeHtml(puzzleNumber) + '">View full puzzle</a></div>';
                    return;
                }
                const c = await resp.json();
                const dir = c.direction.charAt(0).toUpperCase() + c.direction.slice(1);
                const label = c.clue_number + ' ' + dir;

                // Update page title & meta
                document.title = label + ' - Guardian Cryptic #' + c.puzzle_number + ' | Cryptic Hints';
                document.getElementById('metaDesc').setAttribute('content',
                    'Hints for ' + label + ' from Guardian cryptic #' + c.puzzle_number + ': "' + c.clue_text + '"');
                document.getElementById('breadcrumbClue').textContent = label;

                const ptype = (c.puzzle_type === 'quiptic') ? 'Quiptic' : 'Cryptic';
                const setter = (c.setter && c.setter !== 'Unknown') ? ' by ' + escapeHtml(c.setter) : '';

                let hintsHtml = '';
                for (let i = 0; i < c.hints.length; i++) {
                    if (!c.hints[i]) continue;
                    hintsHtml += '<button class="hint-btn" id="hint-btn-' + i + '" onclick="toggleHint(' + i + ')">' + hintLabels[i] + '</button>';
                    hintsHtml += '<div class="hint-text" id="hint-' + i + '">' + escapeHtml(c.hints[i]) + '</div>';
                }

                el.innerHTML =
                    '<div class="clue-card">' +
                        '<div class="clue-header">' +
                            '<span class="clue-number">' + escapeHtml(label) + '</span>' +
                            (c.enumeration ? '<span class="clue-enum">(' + escapeHtml(c.enumeration) + ')</span>' : '') +
                        '</div>' +
                        '<div class="clue-text">' + escapeHtml(c.clue_text) + '</div>' +
                        '<div class="clue-meta">Guardian ' + ptype + ' #' + escapeHtml(c.puzzle_number) + setter +
                            ' &middot; <a href="/puzzle/' + escapeHtml(c.puzzle_number) + '">View full puzzle</a></div>' +
                        '<div class="hints-section">' +
                            '<h2>Progressive Hints</h2>' +
                            hintsHtml +
                        '</div>' +
                    '</div>' +
                    '<a href="/puzzle/' + escapeHtml(c.puzzle_number) + '" class="full-puzzle-link">Solve the full puzzle &rarr;</a>';

            } catch (e) {
                el.innerHTML = '<div class="error-state">Unable to load clue. <a href="/puzzle/' + escapeHtml(puzzleNumber) + '">View full puzzle</a></div>';
            }
        }

        loadClue();
    </script>
