<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table — Cryptic Crossword Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a1a; color: #fff; padding: 1.5rem 2rem; }
  header h1 { font-size: 1.4rem; font-weight: 500; letter-spacing: -0.02em; }
  header p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
  main { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

  /* Search & filter bar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
  .toolbar input[type=text] { flex: 1; min-width: 200px; padding: 9px 14px; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; }
  .toolbar input[type=text]:focus { border-color: #999; }
  .toolbar .hint { font-size: 12px; color: #888; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 1.2rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.08); }

  /* Periodic table grid: 18 columns */
  .table-wrap { overflow-x: auto; padding-bottom: 1rem; }
  .ptable { display: grid; grid-template-columns: repeat(18, minmax(58px, 1fr)); gap: 2px; margin-bottom: 8px; }

  /* Element cell */
  .el { border-radius: 6px; padding: 4px 5px; cursor: default; transition: transform 0.12s, box-shadow 0.12s; position: relative; border: 1px solid rgba(0,0,0,0.06); min-height: 62px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .el:hover { transform: scale(1.15); box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 10; }
  .el .num { font-size: 9px; color: rgba(0,0,0,0.45); position: absolute; top: 3px; left: 5px; }
  .el .symbol { font-size: 18px; font-weight: 700; line-height: 1.1; }
  .el .name { font-size: 8px; color: rgba(0,0,0,0.5); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; }
  .el .mass { font-size: 7.5px; color: rgba(0,0,0,0.35); }
  .el.highlight { outline: 2.5px solid #1a1a1a; outline-offset: -1px; }
  .el.dim { opacity: 0.18; }

  /* Spacer for gaps */
  .gap { visibility: hidden; }

  /* Lanthanide/actinide label arrows */
  .la-label { grid-column: 3; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #888; font-weight: 600; letter-spacing: 0.02em; }

  /* Separator row */
  .sep { grid-column: 1 / -1; height: 12px; }

  /* Category colours — subtle, desaturated palette */
  .cat-alkali       { background: #fde8e8; }
  .cat-alkaline     { background: #fef0cd; }
  .cat-transition   { background: #fff4d6; }
  .cat-post-trans   { background: #d6eef8; }
  .cat-metalloid    { background: #d9f0e0; }
  .cat-nonmetal     { background: #e2f0d9; }
  .cat-halogen      { background: #e5e0f5; }
  .cat-noble        { background: #dde8f8; }
  .cat-lanthanide   { background: #f5e6f0; }
  .cat-actinide     { background: #f0e0e6; }
  .cat-unknown      { background: #eee; }

  /* Detail panel */
  .detail { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; display: none; }
  .detail.active { display: flex; gap: 2rem; flex-wrap: wrap; align-items: flex-start; }
  .detail-symbol { font-size: 4rem; font-weight: 800; line-height: 1; min-width: 90px; text-align: center; padding: 10px; border-radius: 10px; }
  .detail-info { flex: 1; min-width: 200px; }
  .detail-info h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
  .detail-info .meta { font-size: 13px; color: #666; margin-bottom: 10px; }
  .detail-info .cryptic { background: #f8f7f2; border: 1px solid #e8e8e0; border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 1.6; }
  .detail-info .cryptic strong { color: #1a1a1a; }
  .detail-info .cryptic em { color: #888; font-style: normal; }

  /* Crossword-relevant badge */
  .xw { position: absolute; top: 2px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: #e53e3e; }

  @media (max-width: 700px) {
    header { padding: 1rem; }
    main { padding: 0.75rem; }
    .ptable { grid-template-columns: repeat(18, 38px); gap: 1px; }
    .el { min-height: 46px; padding: 2px; }
    .el .symbol { font-size: 14px; }
    .el .name { display: none; }
    .el .mass { display: none; }
    .el .num { font-size: 7px; }
  }
</style>
</head>

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = Object.entries(CAT_MAP).map(([k, [label, color]]) =>
    `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${label}</div>`
  ).join('');
}

function buildTable() {
  const grid = document.getElementById('ptable');
  // Create a position map: "row-col" -> element
  const posMap = {};
  ALL.forEach(e => { posMap[e[5]+'-'+e[6]] = e; });

  let html = '';

  // Rows 1-7: main table
  for (let r = 1; r <= 7; r++) {
    for (let c = 1; c <= 18; c++) {
      const key = r+'-'+c;
      if (posMap[key]) {
        html += cellHTML(posMap[key]);
      } else if (r === 6 && c === 3) {
        html += `<div class="la-label">57–71 ▼</div>`;
      } else if (r === 7 && c === 3) {
        html += `<div class="la-label">89–103 ▼</div>`;
      } else {
        html += `<div class="gap"></div>`;
      }
    }
  }

  // Separator
  html += `<div class="sep"></div>`;

  // Rows 9-10: Lanthanides & Actinides
  for (let r = 9; r <= 10; r++) {
    // Cols 1-2 empty
    html += `<div class="gap"></div><div class="gap"></div>`;
    for (let c = 3; c <= 17; c++) {
      const key = r+'-'+c;
      if (posMap[key]) {
        html += cellHTML(posMap[key]);
      } else {
        html += `<div class="gap"></div>`;
      }
    }
    // Col 18 empty
    html += `<div class="gap"></div>`;
  }

  grid.innerHTML = html;
}

function cellHTML(e) {
  const [num, sym, name, mass, cat] = e;
  const xw = COMMON_XW.has(sym) ? '<div class="xw"></div>' : '';
  return `<div class="el cat-${cat}" data-sym="${sym}" data-num="${num}" data-name="${name}" data-mass="${mass}" data-cat="${cat}" onclick="showDetail('${sym}')">
    <span class="num">${num}</span>${xw}
    <span class="symbol">${esc(sym)}</span>
    <span class="name">${esc(name)}</span>
    <span class="mass">${mass}</span>
  </div>`;
}

function showDetail(sym) {
  const el = ALL.find(e => e[1] === sym);
  if (!el) return;
  const [num, s, name, mass, cat] = el;
  const panel = document.getElementById('detail');
  const catInfo = CAT_MAP[cat] || ['Unknown','#eee'];
  const clues = CRYPTIC[sym] || [];
  const isXw = COMMON_XW.has(sym);

  let crypticHTML = '';
  if (clues.length) {
    crypticHTML = `<div class="cryptic">
      <strong>Cryptic clue words:</strong> ${clues.map(c => esc(c)).join(', ')}<br>
      ${isXw ? '<em>★ Frequently appears in cryptic crossword wordplay</em>' : '<em>Occasionally seen in cryptics</em>'}
    </div>`;
  } else if (isXw) {
    crypticHTML = `<div class="cryptic"><strong>${esc(sym)}</strong> <em>is the chemical symbol — look for "${esc(name.toLowerCase())}" in clues</em></div>`;
  } else {
    crypticHTML = `<div class="cryptic"><em>Rarely seen in cryptic crosswords</em></div>`;
  }

  panel.className = 'detail active';
  panel.innerHTML = `
    <div class="detail-symbol cat-${cat}">${esc(s)}</div>
    <div class="detail-info">
      <h2>${esc(name)}</h2>
      <div class="meta">#${num} &middot; ${mass} &middot; ${catInfo[0]}</div>
      ${crypticHTML}
    </div>`;
}

function filterTable() {

  const cells = document.querySelectorAll('.el');
  if (!q) {
    cells.forEach(c => { c.classList.remove('highlight', 'dim'); });
    return;
  }
  cells.forEach(c => {
    const sym = c.dataset.sym;
    const name = c.dataset.name.toLowerCase();
    const num = c.dataset.num;
    const clues = (CRYPTIC[sym] || []).join(' ').toLowerCase();
    const match = sym.toLowerCase().includes(q) || name.includes(q) || num === q || clues.includes(q);
    c.classList.toggle('highlight', match);
    c.classList.toggle('dim', !match);
  });
}

buildLegend();
buildTable();
</script>
</body>
</html>
